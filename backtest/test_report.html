<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 回测报告 - TESTUSDT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0e27;
            --card: #1a1f3a;
            --accent: #ff6b35;
            --text: #fff;
            --text2: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--accent); margin-bottom: 30px; }
        h1 { background: linear-gradient(135deg, var(--accent), #f7c59f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #2d3748; }
        .card h2 { color: var(--accent); margin-bottom: 15px; font-size: 1.1rem; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .stat-item { background: rgba(255,107,53,0.1); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text2); margin-top: 5px; }
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2d3748; }
        th { color: var(--text2); font-size: 0.85rem; }
        .chart-container { height: 400px; }
    </style>
</head>
