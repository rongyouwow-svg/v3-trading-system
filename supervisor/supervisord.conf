[supervisord]
logfile=/root/.openclaw/workspace/quant/v3-architecture/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=5
loglevel=info
pidfile=/root/.openclaw/workspace/quant/v3-architecture/logs/supervisord.pid
nodaemon=false
minfds=1024
minprocs=200

[unix_http_server]
file=/root/.openclaw/workspace/quant/v3-architecture/logs/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///root/.openclaw/workspace/quant/v3-architecture/logs/supervisor.sock

[include]
files = /root/.openclaw/workspace/quant/v3-architecture/supervisor/*.conf
